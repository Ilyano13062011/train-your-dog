<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gevorderd</title>

<style>
body { font-family:'Segoe UI'; background:#fff4e6; margin:0; }

header { background:#ff9800; color:white; text-align:center; padding:20px; }

.container { max-width:700px; margin:auto; padding:20px; }

.section {
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
border-left:6px solid #ff9800;
}

button {
padding:12px;
background:#ff9800;
color:white;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<header>Gevorderd Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
const oefeningen=[
{t:"Slalom",tip:"Leid rustig"},
{t:"Focus",tip:"Beloon kijken"},
{t:"Volgen",tip:"Let op positie"},
{t:"Zit/lig wissel",tip:"Werk gecontroleerd"},
{t:"Zoek oefening",tip:"Verstop snoepje"},
{t:"Blijf 5 sec",tip:"Stap weg"},
{t:"Tussen benen",tip:"Werk stap voor stap"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
