<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gevorderd Training</title>

<style>
body { font-family:'Segoe UI'; background:#f9f6f2; margin:0; }

header { background:#ff9800; color:white; padding:25px; text-align:center; }

.wrapper { display:flex; max-width:1200px; margin:auto; padding:20px; gap:20px; }

.sidebar-left { width:200px; }
.sidebar-left img { width:100%; border-radius:10px; }

.main { flex:1; }

.section { background:white; padding:20px; border-radius:15px; margin-bottom:20px; }

.sidebar-right { width:200px; }

.box { background:white; padding:15px; border-radius:10px; margin-bottom:10px; }

button { padding:12px; background:#ff9800; color:white; border:none; border-radius:8px; }

@media (max-width:800px){
.wrapper { flex-direction:column; }
.sidebar-left, .sidebar-right { width:100%; }
}
</style>
</head>

<body>

<header>Gevorderd Training</header>

<div class="wrapper">

<div class="sidebar-left">
<img src="https://placedog.net/200/200">
</div>

<div class="main">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>
<button onclick="nieuweChallenge()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<div class="sidebar-right">
<div class="box"><h3>💡 Tip</h3><p>Werk stap voor stap.</p></div>
<div class="box"><h3>🐾 Info</h3><p>Blijf consistent trainen.</p></div>
</div>

</div>

<script>
const oefeningen = [
{tekst:"Slalom",tip:"Leid rustig"},
{tekst:"Zit/lig",tip:"Werk gecontroleerd"},
{tekst:"Focus",tip:"Beloon kijken"},
{tekst:"Volgen",tip:"Let op positie"}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
