<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gevorderd Training</title>

<style>
body { font-family:'Segoe UI'; background:#f9f6f2; margin:0; }

header { background:#ff9800; color:white; padding:30px; text-align:center; }

.container { max-width:700px; margin:auto; padding:20px; }

.section { background:white; padding:25px; border-radius:15px; margin-bottom:20px; }

button {
padding:12px 18px;
background:#ff9800;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.back { text-decoration:none; color:#ff9800; }

/* MOBILE */
@media (max-width:600px){
.section { padding:15px; }
button { width:100%; }
}
</style>
</head>

<body>

<header>Gevorderd Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

<a href="levels.html" class="back">⬅ Terug</a>

</div>

<script>
const oefeningen = [
{tekst:"Slalom",tip:"Leid rustig met hand"},
{tekst:"Zit/lig wissel",tip:"Werk gecontroleerd"},
{tekst:"Focus",tip:"Beloon oogcontact"},
{tekst:"Volgen naast je",tip:"Beloon positie"},
{tekst:"Zoek oefening",tip:"Verstop snoepje"},
{tekst:"Blijf 5 sec",tip:"Stap rustig weg"}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
