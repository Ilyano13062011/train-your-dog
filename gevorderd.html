<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Gevorderd Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9f6f2;
    margin: 0;
}

header {
    background: #ff9800;
    color: white;
    padding: 30px;
    text-align: center;
    font-size: 28px;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.back {
    text-decoration: none;
    color: #ff9800;
}
</style>
</head>

<body>

<header>Gevorderd Training</header>

<div class="container">

<div class="section">
<h2>Doel van deze training</h2>
<p>
Hier werk je aan controle, samenwerking en complexere bewegingen.
Je hond leert beter luisteren en reageren.
</p>
</div>

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik hieronder om een oefening te krijgen.</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip">Tips verschijnen hier.</p>
</div>

<a href="levels.html" class="back">⬅ Terug naar niveaus</a>

</div>

<script>
const oefeningen = [
{
tekst: "Slalom door je benen",
tip: "Werk rustig en begeleid je hond met je hand"
},
{
tekst: "Zit en lig afwisselen",
tip: "Beloon na elke juiste uitvoering"
},
{
tekst: "Focus houden 5 seconden",
tip: "Beloon oogcontact meteen"
},
{
tekst: "Volgen naast je",
tip: "Beloon positie naast je been"
},
{
tekst: "Rondje draaien",
tip: "Gebruik duidelijke handbeweging"
},
{
tekst: "Zoek oefening",
tip: "Verstop een snoepje en laat je hond zoeken"
},
{
tekst: "Blijf 5 seconden",
tip: "Stap rustig weg en kom terug"
},
{
tekst: "Tussen je benen lopen",
tip: "Werk stap voor stap en beloon veel"
}
];

function nieuweChallenge() {
let r = Math.floor(Math.random() * oefeningen.length);

document.getElementById("challenge").innerText = oefeningen[r].tekst;
document.getElementById("tip").innerText = oefeningen[r].tip;
}
</script>

</body>
</html>
