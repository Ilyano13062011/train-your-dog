<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gevorderd Training</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background:#fff4e6;
}

header {
background:#ff9800;
color:white;
padding:30px;
text-align:center;
}

.container {
max-width:800px;
margin:auto;
padding:20px;
}

.card {
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button {
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:12px;
background:#ff9800;
color:white;
cursor:pointer;
}

button:hover {
background:#e68900;
}
</style>
</head>

<body>

<header>
<h1>🐕 Gevorderd Training</h1>
<p>Werk aan controle en samenwerking</p>
</header>

<div class="container">

<div class="card">
<h2>🎯 Oefening</h2>
<p id="challenge">Klik om te starten</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="card">
<h2>💡 Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
const oefeningen=[
{t:"Slalom",tip:"Leid rustig met je hand"},
{t:"Focus",tip:"Beloon oogcontact"},
{t:"Volgen naast je",tip:"Beloon juiste positie"},
{t:"Zit/lig wissel",tip:"Werk gecontroleerd"},
{t:"Zoek oefening",tip:"Verstop snoepjes"},
{t:"Blijf 5 sec",tip:"Stap langzaam weg"},
{t:"Tussen benen lopen",tip:"Werk stap voor stap"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
