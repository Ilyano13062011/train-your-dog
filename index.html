<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Your Dog 🐶</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff7ed;
    text-align: center;
}

header {
    background: orange;
    color: white;
    padding: 20px;
    font-size: 28px;
}

.container {
    padding: 20px;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: white;
    cursor: pointer;
}

.box {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.card {
    width: 200px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card p {
    padding: 10px;
}

#info {
    margin: 20px;
    font-size: 18px;
}

footer {
    background: orange;
    color: white;
    padding: 15px;
}
</style>
</head>

<body>

<header>🐶 Train Your Dog</header>

<div class="container">

<h2>🎯 Challenge generator</h2>
<p id="challenge">Klik op de knop!</p>
<button onclick="nieuweChallenge()">Nieuwe challenge</button>

<div class="box">
🏆 Score: <span id="score">0</span>
</div>

<div class="gallery">

<div class="card" onclick="toonInfo('🐾 Balans: Laat je hond met zijn poten op iets staan. Beloon rustig gedrag.')">
<img src="https://placedog.net/400/300?id=1">
<p>Balans</p>
</div>

<div class="card" onclick="toonInfo('🎯 Focus: Beloon wanneer je hond naar jou kijkt.')">
<img src="https://placedog.net/400/300?id=2">
<p>Focus</p>
</div>

<div class="card" onclick="toonInfo('🌀 Draaien: Lok met een snoepje in een rondje.')">
<img src="https://placedog.net/400/300?id=3">
<p>Draaien</p>
</div>

<div class="card" onclick="toonInfo('🤝 Pootje: Tik zachtjes tegen de poot en beloon.')">
<img src="https://placedog.net/400/300?id=4">
<p>Pootje</p>
</div>

</div>

<p id="info"></p>

</div>

<footer>❤️ Veel plezier!</footer>

<script>
let score = 0;

const challenges = [
    "Laat je hond zitten 🐶",
    "Geef 3 pootjes 🤝",
    "Laat je hond liggen 💤",
    "Roep je hond bij je 📢"
];

function nieuweChallenge() {
    let random = Math.floor(Math.random() * challenges.length);
    document.getElementById("challenge").innerText = challenges[random];

    score++;
    document.getElementById("score").innerText = score;
}

function toonInfo(text) {
    document.getElementById("info").innerText = text;
}
</script>

</body>
</html>
