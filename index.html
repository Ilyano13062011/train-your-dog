<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Your Dog</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f9f6f2; }

header {
background:linear-gradient(135deg,#ff8a00,#ffb347);
color:white;
text-align:center;
padding:40px;
}

.container { max-width:1100px; margin:auto; padding:20px; }

.cards {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card {
background:white;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
width:100%;
height:180px;
object-fit:cover;
}

.btn {
display:inline-block;
margin:20px;
padding:15px 25px;
background:#ff8a00;
color:white;
border-radius:10px;
text-decoration:none;
}

footer {
background:#ff8a00;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>🐶 Train Your Dog</h1>
<p>Train je hond op een leuke en duidelijke manier</p>
</header>

<div class="container">

<a href="levels.html" class="btn">Start de training</a>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1601758228041-f3b2795255f1">
<h3>Beginner</h3>
<p>Puppy training</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
<h3>Gevorderd</h3>
<p>Volwassen hond</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
<h3>Expert</h3>
<p>Actieve hond</p>
</div>

</div>

</div>

<footer>Veel plezier met trainen!</footer>

</body>
</html>
