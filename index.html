<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Your Dog</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f9f6f2; }

header {
background:linear-gradient(135deg,#ff8a00,#ffb347);
color:white;
text-align:center;
padding:40px 20px;
}

.container { max-width:1000px; margin:auto; padding:20px; }

.box {
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

.btn {
display:inline-block;
margin-top:15px;
padding:15px 25px;
background:#ff8a00;
color:white;
border-radius:10px;
text-decoration:none;
}

.features {
display:flex;
gap:20px;
flex-wrap:wrap;
}

.feature {
background:white;
padding:20px;
border-radius:15px;
flex:1;
min-width:250px;
text-align:center;
}

footer {
background:#ff8a00;
color:white;
text-align:center;
padding:20px;
}

@media(max-width:600px){
.features { flex-direction:column; }
}
</style>
</head>

<body>

<header>
<h1>🐶 Train Your Dog</h1>
<p>Train je hond op een duidelijke en leuke manier</p>
</header>

<div class="container">

<div class="box">
<h2>Start jouw training</h2>
<p>Kies een niveau en begin met oefenen.</p>
<a href="levels.html" class="btn">Start de training</a>
</div>

<div class="features">
<div class="feature"><h3>Beginner</h3><p>Basis oefeningen</p></div>
<div class="feature"><h3>Gevorderd</h3><p>Meer controle</p></div>
<div class="feature"><h3>Expert</h3><p>Moeilijke oefeningen</p></div>
</div>

</div>

<footer>Veel plezier met trainen!</footer>

</body>
</html>
