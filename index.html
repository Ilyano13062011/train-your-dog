<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Train Your Dog 🐶</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #fff3e0;
}

header {
    background: orange;
    color: white;
    padding: 20px;
    font-size: 28px;
}

button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
    border: none;
    background: orange;
    color: white;
    cursor: pointer;
}

.gallery {
    margin-top: 20px;
}

.card {
    display: inline-block;
    width: 200px;
    margin: 10px;
    background: white;
    border-radius: 10px;
    cursor: pointer;
}

.card img {
    width: 100%;
}

#info {
    margin-top: 20px;
    font-size: 18px;
    padding: 10px;
}
</style>
</head>

<body>

<header>🐶 Train Your Dog</header>

<h2>🎯 Challenge</h2>
<p id="challenge">Klik op de knop</p>
<button onclick="nieuweChallenge()">Nieuwe challenge</button>

<p>🏆 Score: <span id="score">0</span></p>

<div class="gallery">

<div class="card" onclick="toonInfo('Balans: laat je hond met poten op iets staan en beloon')">
<img src="https://placedog.net/200/150?id=1">
<p>Balans</p>
</div>

<div class="card" onclick="toonInfo('Focus: beloon als je hond naar jou kijkt')">
<img src="https://placedog.net/200/150?id=2">
<p>Focus</p>
</div>

<div class="card" onclick="toonInfo('Draaien: lok je hond in een rondje')">
<img src="https://placedog.net/200/150?id=3">
<p>Draaien</p>
</div>

<div class="card" onclick="toonInfo('Pootje: tik tegen de poot en beloon')">
<img src="https://placedog.net/200/150?id=4">
<p>Pootje</p>
</div>

</div>

<p id="info">Klik op een oefening</p>

<script>
let score = 0;

function nieuweChallenge() {
    let lijst = ["Zit", "Lig", "Kom", "Draai"];
    let random = Math.floor(Math.random() * lijst.length);
    document.getElementById("challenge").innerText = lijst[random];
    score++;
    document.getElementById("score").innerText = score;
}

function toonInfo(text) {
    document.getElementById("info").innerText = text;
}
</script>

</body>
</html>
