<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Your Dog 🐶</title>

<style>

/* BASIS */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff7ed;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #ff8800, #ffb347);
    padding: 25px;
    text-align: center;
    color: white;
    font-size: 30px;
    font-weight: bold;
}

/* INTRO */
.intro {
    text-align: center;
    padding: 40px 20px;
}

.intro h1 {
    font-size: 36px;
}

.intro p {
    font-size: 18px;
    color: #555;
}

/* BUTTON */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: #ff8800;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff6600;
    transform: scale(1.08);
}

/* CHALLENGE */
.challenge-box {
    background: white;
    margin: 30px auto;
    padding: 30px;
    width: 320px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

#challenge {
    font-size: 20px;
    margin: 20px 0;
}

/* LEVEL SELECT */
.levels {
    margin-bottom: 15px;
}

.levels button {
    margin: 5px;
    font-size: 14px;
    padding: 8px 12px;
}

/* GALERIJ */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 30px;
}

.card {
    width: 250px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    font-weight: bold;
}

/* SCORE */
.score {
    text-align: center;
    font-size: 20px;
    margin: 20px;
}

/* FOOTER */
footer {
    background: #ff8800;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<header>
🐶 Train Your Dog
</header>

<div class="intro">
<h1>Train, speel en beleef plezier!</h1>
<p>Leuke challenges voor jou en je hond 🎉</p>
</div>

<div class="challenge-box">

<h2>🎯 Challenge generator</h2>

<div class="levels">
<button onclick="setLevel('easy')">Easy</button>
<button onclick="setLevel('medium')">Medium</button>
<button onclick="setLevel('hard')">Hard</button>
</div>

<p id="challenge">Kies een level en klik!</p>

<button onclick="nieuweChallenge()">Nieuwe challenge</button>

</div>

<div class="score">
🏆 Voltooide challenges: <span id="score">0</span>
</div>
<div class="gallery">

<div class="card" onclick="toonInfo('Balans oefening 🐾')">
<img src="https://placedog.net/400/300?id=1">
<p>🐾 Balans training</p>
</div>

<div class="card" onclick="toonInfo('Focus training 🎯')">
<img src="https://placedog.net/400/300?id=2">
<p>🎯 Focus oefening</p>
</div>

<div class="card" onclick="toonInfo('Draaien 🌀')">
<img src="https://placedog.net/400/300?id=3">
<p>🌀 Trick: draaien</p>
</div>

<div class="card" onclick="toonInfo('Pootje geven 🤝')">
<img src="https://placedog.net/400/300?id=4">
<p>🤝 Pootje geven</p>
</div>

</div>
<p id="info" style="text-align:center; font-size:20px; margin:20px;"></p>
<footer>
❤️ Veel plezier met trainen!
</footer>

<script>

let level = "easy";
let score = 0;

function setLevel(lvl) {
    level = lvl;
    document.getElementById("challenge").innerText = "Klik op nieuwe challenge!";
}

const challenges = {
    easy: [
        "Laat je hond zitten 🐶",
        "Geef 3 pootjes 🤝",
        "Laat je hond liggen 💤",
        "Roep je hond bij je 📢"
    ],
    medium: [
        "5x zit en lig afwisselen 🔁",
        "Slalom door je benen 🚶‍♀️",
        "Zoek een snoepje 🔍",
        "Blijf 10 seconden zitten ⏳"
    ],
    hard: [
        "10 sec balans houden 🐾",
        "Spring over iets 🪜",
        "Draai 3 rondjes 🌀",
        "Loop achteruit 🔄"
    ]
};

function nieuweChallenge() {
    let lijst = challenges[level];
    let random = Math.floor(Math.random() * lijst.length);
    document.getElementById("challenge").innerText = lijst[random];

    score++;
    document.getElementById("score").innerText = score;
}
function toonInfo(text) {
    document.getElementById("info").innerText = text;
}
</script>

</body>
</html>
