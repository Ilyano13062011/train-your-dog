<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beginner Training</title>

<style>
body { font-family:'Segoe UI'; background:#f9f6f2; margin:0; }

header { background:#4CAF50; color:white; padding:30px; text-align:center; }

.container { max-width:700px; margin:auto; padding:20px; }

.section { background:white; padding:25px; border-radius:15px; margin-bottom:20px; }

button {
padding:12px 18px;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.video-btn { background:#2196F3; }
</style>
</head>

<body>

<header>Beginner Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
<button class="video-btn" onclick="openVideo()">🎥 Video</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
let currentVideo = "";

const oefeningen = [
{
tekst:"Zitten",
tip:"Gebruik een snoepje boven het hoofd",
video:"https://www.youtube.com/watch?v=Qm9v1m3yX5g"
},
{
tekst:"Liggen",
tip:"Beweeg snoepje naar beneden",
video:"https://www.youtube.com/watch?v=8n1rH5p9YJ0"
},
{
tekst:"Pootje geven",
tip:"Tik zacht tegen de poot",
video:"https://www.youtube.com/watch?v=YJv1m2s9QWk"
},
{
tekst:"Hier komen",
tip:"Roep vrolijk",
video:"https://www.youtube.com/watch?v=Z3mZ7Yy3XwQ"
}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);

document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
currentVideo = oefeningen[r].video;
}

function openVideo(){
if(currentVideo){
window.open(currentVideo, "_blank");
} else {
alert("Klik eerst op een oefening");
}
}
</script>

</body>
</html>
