<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beginner Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9f6f2;
    margin: 0;
}

header {
    background: #4CAF50;
    color: white;
    padding: 30px;
    text-align: center;
    font-size: 28px;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.back {
    text-decoration: none;
    color: #4CAF50;
}
</style>
</head>

<body>

<header>Beginner Training</header>

<div class="container">

<div class="section">
<h2>Doel van deze training</h2>
<p>
In deze fase werk je aan de basis: rust, aandacht en eenvoudige oefeningen.
Dit vormt de fundering voor verdere training.
</p>
</div>

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik hieronder om een oefening te krijgen.</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip">Tips verschijnen hier.</p>
</div>

<a href="levels.html" class="back">⬅ Terug naar niveaus</a>

</div>

<script>
const oefeningen = [
{
tekst: "Laat je hond rustig zitten",
tip: "Werk met beloning en wacht tot je hond zelf gaat zitten"
},
{
tekst: "Laat je hond liggen",
tip: "Beweeg je hand rustig naar beneden"
},
{
tekst: "Oefen aandacht (focus)",
tip: "Beloon wanneer je hond naar jou kijkt"
},
{
tekst: "Pootje geven",
tip: "Tik zacht tegen de poot"
},
{
tekst: "Naam herkennen",
tip: "Zeg naam en beloon reactie"
},
{
tekst: "Komen (hier)",
tip: "Roep vrolijk en beloon"
},
{
tekst: "Rustig blijven",
tip: "Beloon kalm gedrag"
},
{
tekst: "Oogcontact houden",
tip: "Beloon zodra hij kijkt"
},
{
tekst: "Wachten 3 seconden",
tip: "Begin kort en bouw op"
}
];

function nieuweChallenge() {
let r = Math.floor(Math.random() * oefeningen.length);

document.getElementById("challenge").innerText = oefeningen[r].tekst;
document.getElementById("tip").innerText = oefeningen[r].tip;
}
</script>

</body>
</html>
