<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beginner Training</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f1f8f4;
}

/* HEADER */
header {
background:#4CAF50;
color:white;
padding:30px;
text-align:center;
}

/* CONTAINER */
.container {
max-width:800px;
margin:auto;
padding:20px;
}

/* CARD */
.card {
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TITELS */
h2 {
margin-top:0;
}

/* BUTTON */
button {
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover {
background:#3e8e41;
}

/* EXTRA */
.tip-box {
font-size:14px;
color:#555;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<header>
<h1>🐶 Beginner Training</h1>
<p>Start met de basis en bouw vertrouwen op</p>
</header>

<div class="container">

<div class="card">
<h2>🎯 Oefening</h2>
<p id="challenge">Klik op start om te beginnen</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="card">
<h2>💡 Tip</h2>
<p id="tip"></p>
</div>

<div class="tip-box">
Train kort en maak het leuk voor je hond 🐾
</div>

</div>

<script>
const oefeningen=[
{t:"Zitten",tip:"Gebruik een snoepje boven het hoofd"},
{t:"Liggen",tip:"Beweeg je hand rustig naar beneden"},
{t:"Pootje geven",tip:"Tik zacht tegen de poot"},
{t:"Hier komen",tip:"Roep vrolijk en beloon direct"},
{t:"Naam herkennen",tip:"Zeg naam en beloon reactie"},
{t:"Oogcontact",tip:"Beloon zodra hij naar je kijkt"},
{t:"Rustig blijven",tip:"Beloon kalm gedrag"},
{t:"Wachten",tip:"Begin met korte momenten"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
