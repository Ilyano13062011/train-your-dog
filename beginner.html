<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beginner Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #fff6eb;
    margin: 0;
    text-align: center;
}

header {
    background: linear-gradient(135deg, #4CAF50, #81c784);
    color: white;
    padding: 30px;
    font-size: 28px;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    padding: 15px 20px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: #388e3c;
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    background: #ddd;
    border-radius: 10px;
    margin-top: 10px;
}

.progress-bar {
    height: 20px;
    background: #4CAF50;
    width: 0%;
    border-radius: 10px;
}

/* BACK */
.back {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: #4CAF50;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🐶 Beginner Training</header>

<div class="container">

<div class="box">
<h2>🎯 Oefening</h2>
<p id="challenge">Klik op start 👇</p>

<button onclick="nieuweChallenge()">Start training</button>
<button onclick="addScore()">+1 Punt</button>

<p id="tip"></p>
</div>

<div class="box">
<h2>🏆 Score: <span id="score">0</span></h2>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<a href="levels.html" class="back">⬅ Terug</a>

</div>

<script>

let score = localStorage.getItem("scoreBeginner") || 0;
document.getElementById("score").innerText = score;

const oefeningen = [
{
tekst: "Laat je hond zitten 🐶",
tip: "Beweeg een snoepje boven zijn hoofd"
},
{
tekst: "Geef pootje 🤝",
tip: "Tik zacht tegen de poot"
},
{
tekst: "Laat je hond liggen 💤",
tip: "Lok naar beneden"
}
];

function nieuweChallenge() {
let random = Math.floor(Math.random() * oefeningen.length);

document.getElementById("challenge").innerText = oefeningen[random].tekst;
document.getElementById("tip").innerText = "💡 " + oefeningen[random].tip;
}

function addScore() {
score++;
localStorage.setItem("scoreBeginner", score);
document.getElementById("score").innerText = score;
updateProgress();
}

function updateProgress() {
let progress = Math.min(score * 10, 100);
document.getElementById("progressBar").style.width = progress + "%";
}

updateProgress();

</script>

</body>
</html>
