<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beginner</title>

<style>
body {
font-family:'Segoe UI';
background:#f1f8f4;
margin:0;
}

header {
background:#4CAF50;
color:white;
text-align:center;
padding:25px;
font-size:22px;
}

.container {
max-width:700px;
margin:auto;
padding:20px;
}

/* BOX */
.section {
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
border-left:6px solid #4CAF50;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
padding:14px;
background:#4CAF50;
color:white;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover {
background:#3e8e41;
}

/* EXTRA DECOR */
.footer-tip {
text-align:center;
font-size:14px;
color:#555;
margin-top:20px;
}
</style>
</head>

<body>

<header>🐶 Beginner Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

<div class="footer-tip">
Train kort en maak het leuk voor je hond 🐾
</div>

</div>

<script>
const oefeningen=[
{t:"Zitten",tip:"Gebruik snoepje"},
{t:"Liggen",tip:"Beweeg naar beneden"},
{t:"Pootje",tip:"Tik zacht"},
{t:"Hier komen",tip:"Roep vrolijk"},
{t:"Naam herkennen",tip:"Beloon reactie"},
{t:"Oogcontact",tip:"Beloon kijken"},
{t:"Rustig blijven",tip:"Beloon kalm gedrag"},
{t:"Wachten",tip:"Begin kort"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
