<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Beginner Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9f6f2;
    margin: 0;
}

header {
    background: #4CAF50;
    color: white;
    padding: 30px;
    text-align: center;
    font-size: 28px;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
}

.video-btn {
    background: #2196F3;
}

.back {
    text-decoration: none;
    color: #4CAF50;
}
</style>
</head>

<body>

<header>Beginner Training</header>

<div class="container">

<div class="section">
<h2>Doel van deze training</h2>
<p>Basis oefeningen voor rust en samenwerking.</p>
</div>

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik hieronder om een oefening te krijgen.</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
<button class="video-btn" onclick="openVideo()">🎥 Bekijk uitleg</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

<a href="levels.html" class="back">⬅ Terug</a>

</div>

<script>
let currentVideo = "";

const oefeningen = [
{
tekst:"Zitten",
tip:"Wacht tot je hond zelf zit en beloon",
video:"https://www.youtube.com/watch?v=Qm9v1m3yX5g"
},
{
tekst:"Liggen",
tip:"Beweeg snoepje naar beneden",
video:"https://www.youtube.com/watch?v=8n1rH5p9YJ0"
},
{
tekst:"Pootje geven",
tip:"Tik zacht tegen de poot",
video:"https://www.youtube.com/watch?v=YJv1m2s9QWk"
},
{
tekst:"Komen (hier)",
tip:"Roep vrolijk en beloon",
video:"https://www.youtube.com/watch?v=6b3v3Y4d5Kk"
}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);

document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
currentVideo = oefeningen[r].video;
}

function openVideo(){
if(currentVideo){
window.open(currentVideo, "_blank");
}
}
</script>

</body>
</html>
