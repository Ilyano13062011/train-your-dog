<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beginner</title>

<style>
body { font-family:'Segoe UI'; background:#f9f6f2; margin:0; }

header { background:#4CAF50; color:white; text-align:center; padding:20px; }

.wrapper { display:flex; max-width:1200px; margin:auto; gap:20px; padding:20px; }

.sidebar { width:200px; }

.main { flex:1; }

.section { background:white; padding:20px; border-radius:15px; margin-bottom:20px; }

button { padding:12px; background:#4CAF50; color:white; border:none; border-radius:8px; }

@media(max-width:800px){
.wrapper { flex-direction:column; }
.sidebar { width:100%; }
}
</style>
</head>

<body>

<header>Beginner Training</header>

<div class="wrapper">

<div class="sidebar">
<p><b>Tip:</b> Hou trainingen kort.</p>
</div>

<div class="main">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik om te starten</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<div class="sidebar">
<p><b>Info:</b> Beloon goed gedrag.</p>
</div>

</div>

<script>
const oefeningen=[
{t:"Zitten",tip:"Gebruik snoepje"},
{t:"Liggen",tip:"Beweeg naar beneden"},
{t:"Pootje",tip:"Tik zacht"},
{t:"Hier",tip:"Roep vrolijk"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
