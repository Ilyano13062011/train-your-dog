<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Kies niveau</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #fff6eb;
}

/* TITEL */
h1 {
    margin-top: 30px;
}

/* CARDS */
.card {
    display: inline-block;
    margin: 20px;
    width: 260px;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* KLEUREN PER LEVEL */
.beginner {
    border-top: 6px solid #4CAF50;
}

.gevorderd {
    border-top: 6px solid #ff9800;
}

.expert {
    border-top: 6px solid #f44336;
}

</style>
</head>

<body>

<h1>Kies jouw niveau 🐶</h1>

<a href="beginner.html" class="card beginner">
<img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
<h2>Beginner</h2>
<p>Start rustig en leer de basis</p>
</a>

<a href="gevorderd.html" class="card gevorderd">
<img src="https://images.unsplash.com/photo-1601758125946-6ec2ef64daf8">
<h2>Gevorderd</h2>
<p>Meer uitdaging en beweging</p>
</a>

<a href="expert.html" class="card expert">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
<h2>Expert</h2>
<p>Voor echte toppers 💪</p>
</a>

</body>
</html>
