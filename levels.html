<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niveaus</title>

<style>
body {
font-family:'Segoe UI';
background:#f9f6f2;
margin:0;
text-align:center;
}

.cards {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card {
border-radius:15px;
overflow:hidden;
text-decoration:none;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover {
transform:scale(1.05);
}

.card img {
width:100%;
height:180px;
object-fit:cover;
}

/* KLEUREN */
.beginner { background:#4CAF50; }
.gevorderd { background:#ff9800; }
.expert { background:#f44336; }

.card h2 {
margin:15px;
}
</style>
</head>

<body>

<h1>Kies jouw niveau</h1>

<div class="cards">

<a href="beginner.html" class="card beginner">
<img src="https://images.unsplash.com/photo-1601758174114-e711c0cbaa69">
<h2>Beginner</h2>
</a>

<a href="gevorderd.html" class="card gevorderd">
<img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
<h2>Gevorderd</h2>
</a>

<a href="expert.html" class="card expert">
<img src="https://images.unsplash.com/photo-1600804340584-c7db2eacf0bf">
<h2>Expert</h2>
</a>

</div>

</body>
</html>
