<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niveaus</title>

<style>
body {
font-family:'Segoe UI';
background:linear-gradient(to bottom,#fff7ed,#f9f6f2);
margin:0;
text-align:center;
}

/* TITEL */
h1 {
margin-top:30px;
}

/* GRID */
.cards {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px;
max-width:1000px;
margin:auto;
}

/* CARD */
.card {
border-radius:20px;
overflow:hidden;
text-decoration:none;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
display:block; /* 🔥 BELANGRIJK */
}

.card:hover {
transform:translateY(-8px);
}

/* FOTO */
.card img {
width:100%;
height:200px;
object-fit:cover;
}

/* TEKST */
.card h2 {
margin:15px;
}

/* KLEUREN */
.beginner { background:#4CAF50; }
.gevorderd { background:#ff9800; }
.expert { background:#f44336; }
</style>
</head>

<body>

<h1>Kies jouw niveau</h1>

<div class="cards">

<a href="beginner.html" class="card beginner">
<img src="https://images.unsplash.com/photo-1601758174114-e711c0cbaa69">
<h2>Beginner</h2>
</a>

<a href="gevorderd.html" class="card gevorderd">
<img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
<h2>Gevorderd</h2>
</a>

<a href="expert.html" class="card expert">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
<h2>Expert</h2>
</a>

</div>

</body>
</html>
