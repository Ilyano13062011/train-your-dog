<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Expert Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9f6f2;
    margin: 0;
}

header {
    background: #f44336;
    color: white;
    padding: 30px;
    text-align: center;
    font-size: 28px;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    background: #f44336;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
}

.video-btn {
    background: #2196F3;
}

.back {
    text-decoration: none;
    color: #f44336;
}
</style>
</head>

<body>

<header>Expert Training</header>

<div class="container">

<div class="section">
<h2>Doel van deze training</h2>
<p>Precisie, controle en moeilijke oefeningen.</p>
</div>

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik hieronder om een oefening te krijgen.</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
<button class="video-btn" onclick="openVideo()">🎥 Bekijk uitleg</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

<a href="levels.html" class="back">⬅ Terug</a>

</div>

<script>
let currentVideo = "";

const oefeningen = [
{
tekst:"Balans houden",
tip:"Werk langzaam en gecontroleerd",
video:"https://www.youtube.com/watch?v=9h3Y7X8kL2w"
},
{
tekst:"3 rondjes draaien",
tip:"Gebruik duidelijke signalen",
video:"https://www.youtube.com/watch?v=Y3p2x8b7k9w"
},
{
tekst:"Achteruit lopen",
tip:"Lok kleine stappen",
video:"https://www.youtube.com/watch?v=4k5h6g7j8k9"
},
{
tekst:"Focus met afleiding",
tip:"Begin licht en bouw op",
video:"https://www.youtube.com/watch?v=3j4h5k6l7m8"
}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);

document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
currentVideo = oefeningen[r].video;
}

function openVideo(){
if(currentVideo){
window.open(currentVideo, "_blank");
}
}
</script>

</body>
</html>
