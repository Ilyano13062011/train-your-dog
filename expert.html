<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Expert Training</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9f6f2;
    margin: 0;
}

header {
    background: #f44336;
    color: white;
    padding: 30px;
    text-align: center;
    font-size: 28px;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    background: #f44336;
    color: white;
    border: none;
    border-radius: 8px;
}

.back {
    text-decoration: none;
    color: #f44336;
}
</style>
</head>

<body>

<header>Expert Training</header>

<div class="container">

<div class="section">
<h2>Doel van deze training</h2>
<p>
Dit niveau focust op precisie, controle en moeilijkere oefeningen.
Ideaal voor gevorderde honden en ervaren handlers.
</p>
</div>

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik hieronder om een oefening te krijgen.</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip">Tips verschijnen hier.</p>
</div>

<a href="levels.html" class="back">⬅ Terug naar niveaus</a>

</div>

<script>
const oefeningen = [
{
tekst: "Balans houden 10 seconden",
tip: "Werk langzaam en gecontroleerd"
},
{
tekst: "3 rondjes draaien",
tip: "Gebruik duidelijke signalen"
},
{
tekst: "Achteruit lopen",
tip: "Lok rustig en beloon kleine stappen"
}
];

function nieuweChallenge() {
let r = Math.floor(Math.random() * oefeningen.length);

document.getElementById("challenge").innerText = oefeningen[r].tekst;
document.getElementById("tip").innerText = oefeningen[r].tip;
}
</script>

</body>
</html>
