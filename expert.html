<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Training</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background:#fdecea;
}

header {
background:#f44336;
color:white;
padding:30px;
text-align:center;
}

.container {
max-width:800px;
margin:auto;
padding:20px;
}

.card {
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button {
width:100%;
padding:15px;
font-size:16px;
border:none;
border-radius:12px;
background:#f44336;
color:white;
cursor:pointer;
}

button:hover {
background:#d7372b;
}
</style>
</head>

<body>

<header>
<h1>🐕‍🦺 Expert Training</h1>
<p>Precisie en uitdaging op hoog niveau</p>
</header>

<div class="container">

<div class="card">
<h2>🎯 Oefening</h2>
<p id="challenge">Klik om te starten</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="card">
<h2>💡 Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
const oefeningen=[
{t:"Balans houden",tip:"Werk gecontroleerd"},
{t:"3 rondjes draaien",tip:"Gebruik duidelijke signalen"},
{t:"Achteruit lopen",tip:"Lok kleine stappen"},
{t:"Focus met afleiding",tip:"Begin licht"},
{t:"Blijf 10 sec",tip:"Verleng langzaam"},
{t:"Combinatie oefeningen",tip:"Werk stap voor stap"},
{t:"Perfect volgen",tip:"Let op houding"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
