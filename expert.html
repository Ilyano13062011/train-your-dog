<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Expert Training</title>

<style>
body { font-family:'Segoe UI'; background:#f9f6f2; margin:0; }

header { background:#f44336; color:white; padding:30px; text-align:center; }

.container { max-width:700px; margin:auto; padding:20px; }

.section { background:white; padding:25px; border-radius:15px; margin-bottom:20px; }

button {
padding:12px 18px;
background:#f44336;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.video-btn { background:#2196F3; }
</style>
</head>

<body>

<header>Expert Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>

<button onclick="nieuweChallenge()">Nieuwe oefening</button>
<button class="video-btn" onclick="openVideo()">🎥 Video</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
let currentVideo = "";

const oefeningen = [
{
tekst:"Balans houden",
tip:"Werk langzaam en gecontroleerd",
video:"https://www.youtube.com/watch?v=9h3Y7X8kL2w"
},
{
tekst:"3 rondjes draaien",
tip:"Gebruik duidelijke signalen",
video:"https://www.youtube.com/watch?v=Y3p2x8b7k9w"
},
{
tekst:"Achteruit lopen",
tip:"Lok kleine stappen",
video:"https://www.youtube.com/watch?v=4k5h6g7j8k9"
},
{
tekst:"Focus met afleiding",
tip:"Begin licht en bouw op",
video:"https://www.youtube.com/watch?v=3j4h5k6l7m8"
}
];

function nieuweChallenge(){
let r=Math.floor(Math.random()*oefeningen.length);

document.getElementById("challenge").innerText=oefeningen[r].tekst;
document.getElementById("tip").innerText=oefeningen[r].tip;
currentVideo = oefeningen[r].video;
}

function openVideo(){
if(currentVideo){
window.open(currentVideo, "_blank");
} else {
alert("Klik eerst op een oefening");
}
}
</script>

</body>
</html>
