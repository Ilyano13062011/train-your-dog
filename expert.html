<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert</title>

<style>
body { font-family:'Segoe UI'; background:#fdecea; margin:0; }

header { background:#f44336; color:white; text-align:center; padding:20px; }

.container { max-width:700px; margin:auto; padding:20px; }

.section {
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
border-left:6px solid #f44336;
}

button {
padding:12px;
background:#f44336;
color:white;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<header>Expert Training</header>

<div class="container">

<div class="section">
<h2>Oefening</h2>
<p id="challenge">Klik op start</p>
<button onclick="newTask()">Nieuwe oefening</button>
</div>

<div class="section">
<h2>Tip</h2>
<p id="tip"></p>
</div>

</div>

<script>
const oefeningen=[
{t:"Balans",tip:"Werk langzaam"},
{t:"Rondjes",tip:"Gebruik signalen"},
{t:"Achteruit lopen",tip:"Lok stappen"},
{t:"Focus met afleiding",tip:"Begin licht"},
{t:"Blijf 10 sec",tip:"Verleng"},
{t:"Combinatie oefeningen",tip:"Werk stap voor stap"},
{t:"Precision volgen",tip:"Let op positie"}
];

function newTask(){
let r=Math.floor(Math.random()*oefeningen.length);
document.getElementById("challenge").innerText=oefeningen[r].t;
document.getElementById("tip").innerText=oefeningen[r].tip;
}
</script>

</body>
</html>
